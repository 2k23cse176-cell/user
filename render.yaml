services:
  - type: web
    name: voice-bot-only
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node voice-bot-only.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKENS
        value: replace_with_your_discord_tokens
      - key: AUTO_JOIN
        value: false
      - key: KEEPALIVE_MS
        value: 15000
