<!DOCTYPE html>
<html>
<head>
    <title>GOD MODE INJECTOR TEST</title>
    <style>
        body { background: #1e1f22; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .status { font-size: 24px; font-weight: 900; color: #5865f2; margin-bottom: 20px; }
        .mic-box { padding: 20px; border: 2px solid #5865f2; border-radius: 12px; text-align: center; }
        button { background: #5865f2; border: none; color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="status">⚡ GOD MODE WEB TEST ⚡</div>
    <div class="mic-box">
        <p>Click below to test the Injector</p>
        <button onclick="startTest()">ENABLE TEST MIC</button>
        <div id="visualizer" style="margin-top: 20px; height: 50px; width: 200px; background: #2b2d31; position: relative; overflow: hidden;">
            <div id="bar" style="height: 100%; width: 0%; background: #5865f2; transition: width 0.1s;"></div>
        </div>
    </div>

    <script>
        async function startTest() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log('Stream Active:', stream);
                
                const audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                const update = () => {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = dataArray.reduce((a, b) => a + b, 0);
                    let avg = sum / bufferLength;
                    document.getElementById('bar').style.width = Math.min(100, avg * 2) + '%';
                    requestAnimationFrame(update);
                };
                update();
                alert('INJECTOR TEST ACTIVE! Check the Top Banner.');
            } catch (e) {
                alert('Mic Access Denied or Not Hijacked Yet: ' + e);
            }
        }
    </script>
</body>
</html>
